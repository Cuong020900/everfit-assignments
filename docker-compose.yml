  #     - '3000:3000'
  #   environment:
  #     NODE_ENV: development
  #     DB_HOST: db
  #     DB_PORT: 5432
  #     DB_NAME: workout_db
  #     DB_USER: workout
  #     DB_PASSWORD: workout
  #     LOG_LEVEL: info
  #   depends_on:
  #     db:
  #       condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: workout
      POSTGRES_PASSWORD: workout
      POSTGRES_DB: workout_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U workout']
      interval: 5s
      timeout: 5s
      retries: 5

  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: workout
      POSTGRES_PASSWORD: workout
      POSTGRES_DB: workout_test_db
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U workout']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
